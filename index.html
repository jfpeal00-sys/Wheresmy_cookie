<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheresmy_cookie Gameplays</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #100d14; color: #fff;
    font-family: 'Raleway', -apple-system, Roboto, sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(165deg, #14121a 0%, #211d2c 50%, #100d14 100%);
  }
  #lifestreamCanvas { position: fixed; inset: 0; z-index: 100; pointer-events: none; }
  .shell { position: relative; z-index: 1; padding: 22px 3vw 60px; max-width: 1400px; margin: 0 auto; }

  .hero-section { position: relative; margin: -22px -3vw 0; padding: 22px 3vw 28px; overflow: hidden; }
  .hero-bg-img {
    position: absolute; inset: 0; opacity: 0;
    background-size: cover; background-position: center top;
    animation: heroFadeIn 0.6s ease forwards;
  }
  @keyframes heroFadeIn { to { opacity: 1; } }
  .hero-scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(16,13,20,0.35) 0%, rgba(16,13,20,0.55) 60%, rgba(16,13,20,0.95) 100%);
  }
  .hero-section > .topbar, .hero-section > .hero-row { position: relative; z-index: 1; }

  /* top bar */
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
  .profile { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: #1c1826;
    background-size: cover; background-position: center;
    position: relative; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .avatar::after {
    content: ""; position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px;
    background: #9b8ac4; border: 2px solid #100d14; border-radius: 50%;
  }
  .profile-name { font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .badge {
    font-size: 0.55rem; font-weight: 800; background: #fff; color: #000;
    padding: 1px 6px; border-radius: 2px; letter-spacing: 0.02em;
  }
  .gamerscore { font-size: 0.72rem; color: #b8a8d9; margin-top: 2px; display: flex; align-items: center; gap: 4px; }

  .icon-controls { display: flex; align-items: center; gap: 26px; }
  .icon-flat {
    background: none; border: none; color: #fff; font-size: 1rem; cursor: pointer;
    opacity: 0.9; position: relative;
  }
  .icon-flat:hover { opacity: 1; }
  .popover {
    position: absolute; top: 30px; right: -10px; z-index: 10;
    background: #1c1826; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    padding: 10px; box-shadow: 0 12px 30px rgba(0,0,0,0.5); display: none; min-width: 180px;
  }
  .popover.show { display: block; }
  .popover input, .popover select {
    width: 100%; padding: 7px 9px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15);
    background: #0b0d0e; color: #fff; font-size: 0.78rem; font-family: inherit; outline: none;
  }
  .right-cluster { display: flex; align-items: center; gap: 18px; font-size: 0.85rem; color: #ddd; }

  /* hero row */
  .hero-row { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 28px; overflow-x: auto; padding-bottom: 4px; }
  .tile-focused {
    flex-shrink: 0; width: 230px; height: 300px; border-radius: 6px; overflow: hidden;
    border: 3px solid #9b8ac4; background: #111; position: relative;
    display: flex; flex-direction: column; text-decoration: none; color: inherit;
    box-shadow: 0 0 22px rgba(155,138,196,0.35);
  }
  .tile-focused .art {
    flex: 1; display: flex; align-items: center; justify-content: center; background: #0c0e0c; padding: 14px;
  }
  .tile-focused .art img { max-width: 90%; max-height: 90%; object-fit: contain; }
  .tile-focused .cap { padding: 10px 12px 14px; font-size: 0.85rem; font-weight: 600; line-height: 1.25; }

  .tile-small {
    flex-shrink: 0; width: 140px; height: 140px; border-radius: 6px; overflow: hidden;
    background: #111; display: flex; align-items: center; justify-content: center; padding: 10px;
    text-decoration: none; border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .tile-small:hover { transform: scale(1.05); border-color: rgba(255,255,255,0.4); }
  .tile-small img { max-width: 88%; max-height: 88%; object-fit: contain; }

  /* promo banner row */
  .promo-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .promo {
    position: relative; height: 150px; border-radius: 6px; overflow: hidden;
    text-decoration: none; color: #fff; display: flex; align-items: flex-end;
    padding: 14px; background: #111;
  }
  .promo .pbg { position: absolute; inset: 0; opacity: 0.55; }
  .promo .pbg img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    opacity: 0; transition: opacity 1.1s ease;
  }
  .promo .pbg img.show { opacity: 1; }
  .promo::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.85) 100%);
  }
  .promo .ptext { position: relative; z-index: 1; font-size: 0.85rem; font-weight: 600; }
  .promo .ptag { position: relative; z-index: 1; font-size: 0.62rem; color: #b8a8d9; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.04em; }

  .section-gap { height: 30px; }

  /* ===== panel de estadísticas (5 pestañas) ===== */
  .stats-panel {
    background: rgba(12, 16, 12, 0.55); backdrop-filter: blur(8px);
    border: 1px solid rgba(155,138,196,0.2); border-radius: 10px;
    margin-top: 30px; overflow: hidden;
  }
  .stat-tabs {
    display: flex; gap: 2px; border-bottom: 1px solid rgba(255,255,255,0.08);
    overflow-x: auto; background: #211d2c;
  }
  .stat-tab {
    padding: 13px 16px; font-size: 0.76rem; font-weight: 600; color: rgba(255,255,255,0.4);
    white-space: nowrap; cursor: pointer; position: relative; flex-shrink: 0;
    border: none; background: none; font-family: inherit;
  }
  .stat-tab.active { color: #fff; }
  .stat-tab.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: #9b8ac4; }
  .stat-tab-content { padding: 22px; }
  .stat-tab-content.hidden { display: none; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 18px 20px; }
  .stat-box-label { font-size: 0.62rem; color: #8a7fa0; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .stat-box-value { font-size: 1.35rem; font-weight: 800; color: #f4f1fa; }
  .stat-box-value small { font-size: 0.7rem; font-weight: 600; color: #c9bfe0; margin-left: 3px; }

  .context-callout {
    margin-top: 18px; padding: 12px 14px; background: rgba(155,138,196,0.08);
    border: 1px solid rgba(155,138,196,0.25); border-radius: 8px; font-size: 0.78rem;
  }
  .context-callout b { color: #c9bfe0; }

  .record-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .record-card { background: #211d2c; border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 12px 14px; }
  .record-tag { font-size: 0.6rem; color: #8a7fa0; text-transform: uppercase; margin-bottom: 5px; }
  .record-game { font-size: 0.84rem; font-weight: 700; line-height: 1.25; }
  .record-value { font-size: 0.7rem; color: #c9bfe0; margin-top: 3px; font-family: Consolas, monospace; }

  .bar-row { margin-bottom: 12px; }
  .bar-label { display: flex; justify-content: space-between; font-size: 0.78rem; margin-bottom: 5px; }
  .bar-label .pct { color: #c9bfe0; font-family: Consolas, monospace; font-size: 0.7rem; }
  .bar-track { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, #4a3a70, #9b8ac4); border-radius: 4px; }

  .donut-wrap { display: flex; align-items: center; gap: 20px; margin-top: 24px; flex-wrap: wrap; }
  .donut { width: 130px; height: 130px; border-radius: 50%; flex-shrink: 0; position: relative; }
  .donut::after { content: ""; position: absolute; inset: 18px; border-radius: 50%; background: #0c0f0c; }
  .donut-legend { display: flex; flex-direction: column; gap: 7px; font-size: 0.76rem; }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; display: inline-block; margin-right: 7px; flex-shrink: 0; }

  .timeline { position: relative; padding: 20px 0 6px; overflow-x: auto; }
  .timeline-line { position: absolute; top: 26px; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.1); }
  .timeline-track { display: flex; justify-content: space-between; position: relative; gap: 14px; min-width: max-content; padding: 0 4px; }
  .timeline-point { display: flex; flex-direction: column; align-items: center; width: 60px; }
  .timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: #9b8ac4; margin-bottom: 8px; box-shadow: 0 0 8px rgba(155,138,196,0.6); }
  .timeline-year { font-size: 0.68rem; color: #c9bfe0; font-weight: 700; }
  .timeline-count { font-size: 0.62rem; color: #777; margin-top: 2px; }

  .decade-row { display: flex; justify-content: space-between; margin-top: 26px; padding-top: 18px; border-top: 1px dashed rgba(255,255,255,0.1); font-size: 0.76rem; align-items: flex-end; }
  .decade-item { text-align: center; }
  .decade-bar { width: 30px; background: linear-gradient(180deg, #9b8ac4, #4a3a70); border-radius: 3px; margin: 0 auto 6px; }
  .decade-label { color: #777; font-size: 0.66rem; }

  .compare-wrap { display: flex; gap: 12px; align-items: center; }
  .compare-side { flex: 1; background: #211d2c; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 14px; min-width: 0; }
  .compare-vs { font-size: 0.9rem; font-weight: 800; color: #9b8ac4; flex-shrink: 0; }
  .compare-select {
    width: 100%; background: #1c1826; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    color: #fff; font-size: 0.76rem; padding: 7px 9px; margin-bottom: 12px; font-family: inherit;
  }
  .compare-stat { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 8px; }
  .compare-stat:last-child { border-bottom: none; }
  .compare-stat span:first-child { color: #999; flex-shrink: 0; }
  .compare-stat span:last-child { color: #c9bfe0; font-weight: 600; text-align: right; }

  /* ===== panel de información del juego, estilo boleto ===== */
  .info-ticket {
    background: rgba(12, 16, 12, 0.55); backdrop-filter: blur(8px);
    border: 1px solid rgba(155,138,196,0.2); border-radius: 10px;
    display: flex; margin-bottom: 24px; position: relative; z-index: 1;
  }
  .info-main { flex: 1.4; padding: 16px 20px; min-width: 0; }
  .info-title {
    font-size: 1.02rem; font-weight: 800; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .info-sub { font-size: 0.7rem; color: #c9bfe0; text-transform: uppercase; letter-spacing: 0.03em; }
  .info-icon-placeholder { width: 63px; height: 63px; margin-top: 10px; }
  .info-icon-placeholder img { width: 100%; height: 100%; object-fit: contain; }
  .info-divider {
    width: 0; border-left: 1px dashed rgba(255,255,255,0.25); position: relative; margin: 12px 0;
  }
  .info-divider::before, .info-divider::after {
    content: ""; position: absolute; left: -8px; width: 16px; height: 16px; background: #100d14; border-radius: 50%;
  }
  .info-divider::before { top: -12px; } .info-divider::after { bottom: -12px; }
  .info-stats { flex: 1; padding: 16px 20px; display: flex; flex-direction: column; justify-content: center; gap: 9px; }
  .info-stat { display: flex; justify-content: space-between; font-size: 0.75rem; gap: 12px; }
  .info-stat-label { color: #7a7a7a; flex-shrink: 0; }
  .info-stat-value { font-weight: 600; text-align: right; }

  /* modal de confirmación */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 150; display: none;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(3px);
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #1c1826; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    padding: 22px; max-width: 340px; width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  }
  .modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 14px; }
  .modal-attrs {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px;
    background: #211d2c; border-radius: 8px; padding: 12px 14px; margin-bottom: 16px;
  }
  .modal-attr-label {
    font-size: 0.62rem; color: #8a7fa0; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .modal-attr-value { font-size: 0.8rem; color: #fff; font-weight: 600; margin-top: 2px; }
  .modal-attr-value.muted { color: #6b6b6b; font-weight: 400; font-style: italic; }
  .modal-divider { border-top: 1px solid rgba(255,255,255,0.08); margin-bottom: 14px; }
  .modal-url {
    font-size: 0.72rem; color: #a89ab8; word-break: break-all;
    background: #211d2c; border-radius: 6px; padding: 8px 10px; margin-bottom: 18px;
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btn {
    border: none; border-radius: 6px; padding: 9px 16px; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .modal-btn.cancel { background: rgba(255,255,255,0.08); color: #fff; }
  .modal-btn.cancel:hover { background: rgba(255,255,255,0.15); }
  .modal-btn.confirm { background: #9b8ac4; color: #04250a; }
  .modal-btn.confirm:hover { background: #b09bd9; }
</style>
</head>

// Modal de confirmación antes de abrir cualquier enlace de YouTube
const confirmModal = document.getElementById('confirmModal');
const modalTitle = document.getElementById('modalTitle');
const modalAttrs = document.getElementById('modalAttrs');
const modalUrl = document.getElementById('modalUrl');
const modalCancel = document.getElementById('modalCancel');
const modalConfirm = document.getElementById('modalConfirm');
let pendingUrl = null;

function formatDate(iso) {
  if (!iso) return null;
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short', year: 'numeric' });
}

function attrRow(label, value, muted) {
  return `<div>
      <div class="modal-attr-label">${label}</div>
      <div class="modal-attr-value${muted ? ' muted' : ''}">${value}</div>
    </div>`;
}

function showConfirmModal(game) {
  pendingUrl = game.url;
  modalTitle.textContent = game.title;

  const videoCountMatch = (game.desc || '').match(/\d+/);
  const videoCount = videoCountMatch ? videoCountMatch[0] + ' videos' : 'No disponible';
  const playlistDate = formatDate(game.updated) || 'No disponible';
  const releaseDate = game.releaseDate ? formatDate(game.releaseDate) : 'No disponible';
  const duration = game.duration || 'No disponible';

  modalAttrs.innerHTML =
    attrRow('Género', game.genre || 'Sin categoría') +
    attrRow('Fecha de lanzamiento', releaseDate, !game.releaseDate) +
    attrRow('Playlist actualizada', playlistDate) +
    attrRow('Cantidad de videos', videoCount) +
    attrRow('Duración total', duration, !game.duration);

  modalUrl.textContent = game.url;
  confirmModal.classList.add('show');
}
function hideConfirmModal() {
  confirmModal.classList.remove('show');
  pendingUrl = null;
}
modalCancel.addEventListener('click', hideConfirmModal);
modalConfirm.addEventListener('click', () => {
  if (pendingUrl) window.open(pendingUrl, '_blank', 'noopener,noreferrer');
  hideConfirmModal();
});
confirmModal.addEventListener('click', (e) => {
  if (e.target === confirmModal) hideConfirmModal();
});
let currentHeroBg = null;
function setHeroBackground(src) {
  if (!src || src === currentHeroBg) {
    if (!src) { heroSection.querySelectorAll('.hero-bg-img, .hero-scrim').forEach(el => el.remove()); currentHeroBg = null; }
    return;
  }
  currentHeroBg = src;
  heroSection.querySelectorAll('.hero-bg-img, .hero-scrim').forEach(el => el.remove());
  const imgLayer = document.createElement('div');
  imgLayer.className = 'hero-bg-img';
  imgLayer.style.backgroundImage = `url("${src}")`;
  const scrim = document.createElement('div');
  scrim.className = 'hero-scrim';
  heroSection.prepend(scrim);
  heroSection.prepend(imgLayer);
}

let selectedKey = null;
let promoPicks = null; // se sortea una sola vez por sesión, no en cada render

function updateHeroRowPadding() {
  const containerW = heroRow.clientWidth;
  const approxTileHalf = 75; // mitad aproximada del ancho de un tile pequeño
  const sidePad = Math.max(16, Math.round(containerW / 2 - approxTileHalf));
  heroRow.style.paddingLeft = sidePad + 'px';
  heroRow.style.paddingRight = sidePad + 'px';
}

function startPromoCycling() {
  document.querySelectorAll('.promo').forEach(el => {
    const genre = el.dataset.genre;
    const pool = genre === 'all' ? playlists : playlists.filter(p => (p.genre || 'Sin categoria') === genre);
    if (pool.length <= 1) return; // nada distinto para mostrar

    let showingA = true;
    let currentGame = promoPicks.find(p => p.genre === genre)?.game;

    setInterval(() => {
      let next;
      do {
        next = pool[Math.floor(Math.random() * pool.length)];
      } while (next === currentGame && pool.length > 1);
      currentGame = next;

      const bgImg = next.bg || next.thumb || '';
      if (!bgImg) return;

      const imgA = el.querySelector('.pbg-a');
      const imgB = el.querySelector('.pbg-b');
      const showingImg = showingA ? imgB : imgA;
      const hidingImg = showingA ? imgA : imgB;

      showingImg.src = bgImg;
      showingImg.classList.add('show');
      hidingImg.classList.remove('show');
      showingA = !showingA;
    }, 5000);
  });
}

function render() {
  const searchText = searchInput.value.toLowerCase();
  const genreVal = genreFilter.value;
  const sortVal = sortBy.value;

  let filtered = playlists.filter(p => {
    const matchesSearch = p.title.toLowerCase().includes(searchText);
    const matchesGenre = genreVal === "all" || (p.genre || "Sin categoria") === genreVal;
    return matchesSearch && matchesGenre;
  });
  filtered.sort((a, b) => {
    if (sortVal === "title-asc") return a.title.localeCompare(b.title);
    if (sortVal === "title-desc") return b.title.localeCompare(a.title);
    if (sortVal === "date-desc") return new Date(b.updated) - new Date(a.updated);
    if (sortVal === "date-asc") return new Date(a.updated) - new Date(b.updated);
    return 0;
  });

  heroRow.innerHTML = "";
  promoRow.innerHTML = "";
  if (filtered.length === 0) {
    heroRow.innerHTML = '<div style="color:#888;padding:20px;">No se encontraron playlists.</div>';
    return;
  }

  // ¿Cuál está seleccionada? Si la anterior ya no está en la lista filtrada, cae en la primera.
  let selected = filtered.find(p => p.url === selectedKey) || filtered[0];
  selectedKey = selected.url;
  setHeroBackground(selected.bg || selected.thumb || '');
  renderInfoTicket(selected);
  if (typeof updateContextCallout === 'function') updateContextCallout();

  // Todas las tarjetas en su orden natural; la seleccionada se ve grande, el resto pequeñas.
  filtered.forEach(p => {
    const art = p.thumb ? `<img src="${p.thumb}" alt="">` : '';
    if (p.url === selectedKey) {
      heroRow.innerHTML += `<a class="tile-focused" href="javascript:void(0)" data-url="${p.url}">
          <div class="art">${art}</div>
          <div class="cap">${p.title}</div>
        </a>`;
    } else {
      heroRow.innerHTML += `<a class="tile-small" href="javascript:void(0)" data-url="${p.url}">${art}</a>`;
    }
  });

  // Tocar/hacer clic en una tarjeta no seleccionada la selecciona (no navega);
  // tocar la ya seleccionada (la grande) abre el modal de confirmación antes de ir a YouTube.
  heroRow.querySelectorAll('a[data-url]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      if (a.dataset.url !== selectedKey) {
        selectedKey = a.dataset.url;
        render();
      } else {
        const game = playlists.find(g => g.url === a.dataset.url);
        showConfirmModal(game);
      }
    });
  });

  updateHeroRowPadding();

  // Banda de banners: tarjeta "Todos" + una por género, con un juego aleatorio como imagen.
  // Se construye UNA SOLA VEZ por sesión (no en cada render), para que el ciclado automático
  // de imágenes cada 5s no se reinicie cada vez que cambias de tarjeta/filtro.
  if (!promoPicks) {
    const genres = [...new Set(playlists.map(p => p.genre || "Sin categoria"))].sort();
    const randomAny = playlists[Math.floor(Math.random() * playlists.length)];
    promoPicks = [
      { genre: 'all', game: randomAny, label: 'Todos' },
      ...genres.map(g => {
        const inGenre = playlists.filter(p => (p.genre || "Sin categoria") === g);
        const randomGame = inGenre[Math.floor(Math.random() * inGenre.length)];
        return { genre: g, game: randomGame, label: g };
      })
    ];

    promoRow.innerHTML = "";
    promoPicks.forEach(({ genre, game, label }) => {
      const bgImg = (game && (game.bg || game.thumb)) || '';
      const el = document.createElement('a');
      el.className = 'promo';
      el.href = 'javascript:void(0)';
      el.dataset.genre = genre;
      el.innerHTML = `
          <div class="pbg">
            <img class="pbg-a${bgImg ? ' show' : ''}" src="${bgImg}" alt="">
            <img class="pbg-b" alt="">
          </div>
          <div style="position:relative;z-index:1;">
            <span class="ptag">Categoría</span>
            <span class="ptext">Explora: ${label}</span>
          </div>`;
      el.addEventListener('click', () => {
        try {
          history.pushState({ genre }, '', '#' + encodeURIComponent(genre));
        } catch (err) {
          console.warn('pushState no disponible en este entorno:', err.message);
        }
        genreFilter.value = genre;
        resetSelectionAndRender();
        heroSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      promoRow.appendChild(el);
    });

    startPromoCycling();
  }
}

// Scroll en la fila: selecciona automáticamente la tarjeta más cercana al centro
let scrollTicking = false;
heroRow.addEventListener('scroll', () => {
  if (scrollTicking) return;
  scrollTicking = true;
  requestAnimationFrame(() => {
    const rowRect = heroRow.getBoundingClientRect();
    const rowCenter = rowRect.left + rowRect.width / 2;
    let closest = null, closestDist = Infinity;
    heroRow.querySelectorAll('a[data-url]').forEach(a => {
      const r = a.getBoundingClientRect();
      const center = r.left + r.width / 2;
      const dist = Math.abs(center - rowCenter);
      if (dist < closestDist) { closestDist = dist; closest = a; }
    });
    if (closest && closest.dataset.url !== selectedKey) {
      selectedKey = closest.dataset.url;
      render();
    }
    scrollTicking = false;
  });
}, { passive: true });

function parseDurationToMinutes(dur) {
  if (!dur) return 0;
  const hMatch = dur.match(/(\d+)\s*h/);
  const mMatch = dur.match(/(\d+)\s*m/);
  const h = hMatch ? parseInt(hMatch[1], 10) : 0;
  const m = mMatch ? parseInt(mMatch[1], 10) : 0;
  return h * 60 + m;
}
function formatMinutes(totalMin) {
  const h = Math.floor(totalMin / 60);
  const m = Math.round(totalMin % 60);
  return `${h}h ${m}m`;
}
function videoCountOf(p) {
  const match = (p.desc || '').match(/\d+/);
  return match ? parseInt(match[0], 10) : 0;
}

function formatShortDate(iso) {
  if (!iso) return null;
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString('es-CO', { month: 'short', year: 'numeric' });
}

function renderStats() {
  const totalGames = playlists.length;
  const totalVideos = playlists.reduce((sum, p) => sum + videoCountOf(p), 0);
  const totalMinutes = playlists.reduce((sum, p) => sum + parseDurationToMinutes(p.duration), 0);
  const avgVideos = totalGames ? (totalVideos / totalGames).toFixed(1) : 0;
  const avgMinutes = totalGames ? totalMinutes / totalGames : 0;

  // ===== TAB 1: GENERAL =====
  const genTab = document.getElementById('statTabGeneral');
  genTab.innerHTML = `
    <div class="stats-grid">
      <div><div class="stat-box-label">Juegos</div><div class="stat-box-value">${totalGames}</div></div>
      <div><div class="stat-box-label">Videos totales</div><div class="stat-box-value">${totalVideos}</div></div>
      <div><div class="stat-box-label">Capítulos totales</div><div class="stat-box-value">${totalVideos}</div></div>
      <div><div class="stat-box-label">Horas totales</div><div class="stat-box-value">${formatMinutes(totalMinutes)}</div></div>
      <div><div class="stat-box-label">Videos promedio</div><div class="stat-box-value">${avgVideos}<small>/juego</small></div></div>
      <div><div class="stat-box-label">Tiempo promedio</div><div class="stat-box-value">${formatMinutes(avgMinutes)}<small>/juego</small></div></div>
    </div>
    <div class="context-callout" id="contextCallout"></div>
  `;
  updateContextCallout(totalMinutes);

  // ===== TAB 2: RÉCORDS =====
  const withDuration = playlists.filter(p => parseDurationToMinutes(p.duration) > 0);
  const longest = withDuration.slice().sort((a,b) => parseDurationToMinutes(b.duration) - parseDurationToMinutes(a.duration))[0];
  const shortest = withDuration.slice().sort((a,b) => parseDurationToMinutes(a.duration) - parseDurationToMinutes(b.duration))[0];
  const mostVideos = playlists.slice().sort((a,b) => videoCountOf(b) - videoCountOf(a))[0];
  const leastVideos = playlists.slice().sort((a,b) => videoCountOf(a) - videoCountOf(b))[0];
  const withRelease = playlists.filter(p => p.releaseDate);
  const oldestRelease = withRelease.slice().sort((a,b) => new Date(a.releaseDate) - new Date(b.releaseDate))[0];
  const newestRelease = withRelease.slice().sort((a,b) => new Date(b.releaseDate) - new Date(a.releaseDate))[0];
  const withUpdated = playlists.filter(p => p.updated);
  const newestPlaylist = withUpdated.slice().sort((a,b) => new Date(b.updated) - new Date(a.updated))[0];
  const oldestPlaylist = withUpdated.slice().sort((a,b) => new Date(a.updated) - new Date(b.updated))[0];

  const recTab = document.getElementById('statTabRecords');
  const recordCard = (tag, game, value) => game ? `
    <div class="record-card"><div class="record-tag">${tag}</div><div class="record-game">${game.title}</div><div class="record-value">${value}</div></div>
  ` : '';
  recTab.innerHTML = `
    <div class="record-grid">
      ${recordCard('Juego más largo', longest, longest ? longest.duration : '')}
      ${recordCard('Juego más corto', shortest, shortest ? shortest.duration : '')}
      ${recordCard('Más videos', mostVideos, videoCountOf(mostVideos) + ' videos')}
      ${recordCard('Menos videos', leastVideos, videoCountOf(leastVideos) + ' videos')}
      ${recordCard('Lanzamiento más antiguo', oldestRelease, oldestRelease ? new Date(oldestRelease.releaseDate).getFullYear() : '')}
      ${recordCard('Lanzamiento más reciente', newestRelease, newestRelease ? new Date(newestRelease.releaseDate).getFullYear() : '')}
      ${recordCard('Playlist más reciente', newestPlaylist, formatShortDate(newestPlaylist.updated))}
      ${recordCard('Playlist más antigua', oldestPlaylist, formatShortDate(oldestPlaylist.updated))}
    </div>
  `;

  // ===== TAB 3: CATEGORÍAS =====
  const genres = [...new Set(playlists.map(p => p.genre || 'Sin categoria'))].sort();
  const byGenre = genres.map(g => {
    const inGenre = playlists.filter(p => (p.genre || 'Sin categoria') === g);
    const minutes = inGenre.reduce((sum, p) => sum + parseDurationToMinutes(p.duration), 0);
    return { genre: g, count: inGenre.length, minutes };
  });
  const donutColors = ['#9b8ac4', '#7a5ba8', '#c9bfe0', '#3d2d5c', '#4a3a70', '#a893c9'];
  let cursor = 0;
  const gradientStops = byGenre.map((g, i) => {
    const pct = totalMinutes ? (g.minutes / totalMinutes * 100) : 0;
    const start = cursor;
    cursor += pct;
    return `${donutColors[i % donutColors.length]} ${start.toFixed(1)}% ${cursor.toFixed(1)}%`;
  }).join(', ');

  const catTab = document.getElementById('statTabCategorias');
  catTab.innerHTML = `
    ${byGenre.map(g => {
      const pct = totalGames ? Math.round(g.count / totalGames * 100) : 0;
      return `<div class="bar-row">
        <div class="bar-label"><span>${g.genre}</span><span class="pct">${pct}% · ${g.count} juego${g.count !== 1 ? 's' : ''}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')}
    <div class="donut-wrap">
      <div class="donut" style="background: conic-gradient(${gradientStops || '#333 0% 100%'});"></div>
      <div class="donut-legend">
        ${byGenre.map((g, i) => {
          const pct = totalMinutes ? Math.round(g.minutes / totalMinutes * 100) : 0;
          return `<div><span class="legend-dot" style="background:${donutColors[i % donutColors.length]}"></span>${g.genre} — ${pct}% del tiempo</div>`;
        }).join('')}
      </div>
    </div>
  `;

  // ===== TAB 4: CRONOLOGÍA =====
  const byYear = {};
  withUpdated.forEach(p => {
    const y = p.updated.slice(0, 4);
    byYear[y] = (byYear[y] || 0) + 1;
  });
  const years = Object.keys(byYear).sort();

  const decades = { '90s': 0, '2000s': 0, '2010s': 0, '2020s': 0 };
  withRelease.forEach(p => {
    const y = new Date(p.releaseDate).getFullYear();
    if (y < 2000) decades['90s']++;
    else if (y < 2010) decades['2000s']++;
    else if (y < 2020) decades['2010s']++;
    else decades['2020s']++;
  });
  const maxDecade = Math.max(...Object.values(decades), 1);

  const cronoTab = document.getElementById('statTabCronologia');
  cronoTab.innerHTML = `
    <div class="timeline">
      <div class="timeline-line"></div>
      <div class="timeline-track">
        ${years.map(y => `
          <div class="timeline-point">
            <div class="timeline-dot"></div>
            <div class="timeline-year">${y}</div>
            <div class="timeline-count">${byYear[y]} juego${byYear[y] !== 1 ? 's' : ''}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="decade-row">
      ${Object.entries(decades).map(([label, count]) => `
        <div class="decade-item">
          <div class="decade-bar" style="height:${Math.max(8, count / maxDecade * 56)}px;"></div>
          <div class="decade-label">${label}<br>${count}</div>
        </div>
      `).join('')}
    </div>
  `;

  // ===== TAB 5: COMPARAR =====
  const cmpTab = document.getElementById('statTabComparar');
  const options = playlists.map(p => `<option value="${p.title}">${p.title}</option>`).join('');
  cmpTab.innerHTML = `
    <div class="compare-wrap">
      <div class="compare-side">
        <select class="compare-select" id="cmpSelectA">${options}</select>
        <div id="cmpStatsA"></div>
      </div>
      <div class="compare-vs">VS</div>
      <div class="compare-side">
        <select class="compare-select" id="cmpSelectB">${options}</select>
        <div id="cmpStatsB"></div>
      </div>
    </div>
  `;
  const selA = document.getElementById('cmpSelectA');
  const selB = document.getElementById('cmpSelectB');
  selA.value = playlists[0]?.title;
  selB.value = playlists[1] ? playlists[1].title : playlists[0]?.title;

  function renderCompareStats(title, target) {
    const p = playlists.find(g => g.title === title);
    if (!p) return;
    target.innerHTML = `
      <div class="compare-stat"><span>Videos</span><span>${videoCountOf(p)}</span></div>
      <div class="compare-stat"><span>Duración</span><span>${p.duration || 'No disponible'}</span></div>
      <div class="compare-stat"><span>Lanzamiento</span><span>${p.releaseDate ? new Date(p.releaseDate).getFullYear() : 'No disponible'}</span></div>
      <div class="compare-stat"><span>Playlist actualizada</span><span>${formatShortDate(p.updated) || 'No disponible'}</span></div>
      <div class="compare-stat"><span>Categoría</span><span>${p.genre || 'Sin categoría'}</span></div>
    `;
  }
  renderCompareStats(selA.value, document.getElementById('cmpStatsA'));
  renderCompareStats(selB.value, document.getElementById('cmpStatsB'));
  selA.addEventListener('change', () => renderCompareStats(selA.value, document.getElementById('cmpStatsA')));
  selB.addEventListener('change', () => renderCompareStats(selB.value, document.getElementById('cmpStatsB')));
}

function updateContextCallout(totalMinutes) {
  const callout = document.getElementById('contextCallout');
  if (!callout) return;
  const game = playlists.find(p => p.url === selectedKey);
  if (!game) { callout.style.display = 'none'; return; }
  const gameMinutes = parseDurationToMinutes(game.duration);
  const totalMin = totalMinutes !== undefined ? totalMinutes : playlists.reduce((sum, p) => sum + parseDurationToMinutes(p.duration), 0);
  const pct = totalMin ? (gameMinutes / totalMin * 100).toFixed(1) : 0;
  callout.style.display = 'block';
  callout.innerHTML = `🎮 <b>${game.title}</b> representa el <b>${pct}%</b> de tu tiempo total en la colección.`;
}

document.querySelectorAll('.stat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.stat-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.stat-tab-content').forEach(c => c.classList.add('hidden'));
    tab.classList.add('active');
    document.getElementById('statTab' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)).classList.remove('hidden');
  });
});

populateGenres();
render();
renderStats();
window.addEventListener('resize', updateHeroRowPadding);

function resetSelectionAndRender() {
  selectedKey = null;
  render();
}

// Al presionar "atrás" en el navegador, vuelve a la vista sin filtro de género
window.addEventListener('popstate', (e) => {
  genreFilter.value = (e.state && e.state.genre) || 'all';
  resetSelectionAndRender();
});
searchInput.addEventListener('input', resetSelectionAndRender);
genreFilter.addEventListener('change', resetSelectionAndRender);
sortBy.addEventListener('change', resetSelectionAndRender);

// ===== Efecto "Lifestream" en ráfagas: overlay sutil sobre toda la app, cada 15s =====
(function() {
  const canvas = document.getElementById('lifestreamCanvas');
  const lctx = canvas.getContext('2d');
  let LW, LH;
  function lResize() { LW = canvas.width = innerWidth; LH = canvas.height = innerHeight; }
  lResize();
  window.addEventListener('resize', lResize);

  let activeParticles = [];
  let activeRibbons = [];

  function spawnParticle() {
    const baseX = Math.random() * LW;
    return {
      x: baseX, baseX,
      y: LH + 20 + Math.random() * 60,
      r: 1.1 + Math.random() * 2,
      speed: 0.4 + Math.random() * 0.7,
      freqA: 0.01 + Math.random() * 0.015, ampA: 6 + Math.random() * 10,
      phaseA: Math.random() * Math.PI * 2,
      life: 0, maxLife: 220 + Math.random() * 160,
    };
  }
  function spawnRibbon() {
    return {
      baseY: LH * (0.03 + Math.random() * 0.94),
      amp: 20 + Math.random() * 40,
      freq: 0.002 + Math.random() * 0.003,
      speed: 0.4 + Math.random() * 0.5,
      offset: Math.random() * 1000,
      width: 1.3 + Math.random() * 1.5,
      life: 0, maxLife: 260 + Math.random() * 140
    };
  }

  function burst() {
    const pCount = 6 + Math.floor(Math.random() * 5);   // 6–10 partículas
    for (let i = 0; i < pCount; i++) activeParticles.push(spawnParticle());
    const rCount = 6 + Math.floor(Math.random() * 4);   // 6–9 hilos, repartidos por toda la pantalla
    for (let i = 0; i < rCount; i++) activeRibbons.push(spawnRibbon());
  }

  function drawParticles() {
    activeParticles = activeParticles.filter(p => p.life < p.maxLife && p.y > -20);
    activeParticles.forEach(p => {
      p.life++; p.y -= p.speed;
      p.x = p.baseX + Math.sin(p.life * p.freqA + p.phaseA) * p.ampA;
      const lifeRatio = p.life / p.maxLife;
      let alpha;
      if (lifeRatio < 0.25) alpha = lifeRatio / 0.25;
      else if (lifeRatio > 0.7) alpha = 1 - (lifeRatio - 0.7) / 0.3;
      else alpha = 1;
      alpha *= 0.32;
      const grad = lctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 6.5);
      grad.addColorStop(0, `rgba(244, 241, 250, ${alpha * 0.9})`);
      grad.addColorStop(0.25, `rgba(244, 241, 250, ${alpha * 0.55})`);
      grad.addColorStop(0.6, `rgba(244, 241, 250, ${alpha * 0.18})`);
      grad.addColorStop(1, `rgba(244, 241, 250, 0)`);
      lctx.beginPath(); lctx.fillStyle = grad; lctx.arc(p.x, p.y, p.r * 6.5, 0, Math.PI * 2); lctx.fill();
    });
  }

  function drawRibbons() {
    activeRibbons = activeRibbons.filter(r => r.life < r.maxLife);
    activeRibbons.forEach(r => {
      r.life++;
      const lifeRatio = r.life / r.maxLife;
      let alpha;
      if (lifeRatio < 0.2) alpha = lifeRatio / 0.2;
      else if (lifeRatio > 0.65) alpha = 1 - (lifeRatio - 0.65) / 0.35;
      else alpha = 1;
      alpha *= 0.09;

      lctx.beginPath();
      for (let x = -20; x <= LW + 20; x += 8) {
        const y = r.baseY + Math.sin((x + r.life * r.speed + r.offset) * r.freq) * r.amp
                  + Math.sin((x - r.life * r.speed * 0.6) * r.freq * 2.3) * r.amp * 0.35;
        if (x === -20) lctx.moveTo(x, y); else lctx.lineTo(x, y);
      }
      lctx.strokeStyle = `rgba(244, 241, 250, ${alpha})`;
      lctx.lineWidth = r.width;
      lctx.shadowColor = `rgba(244, 241, 250, 0.8)`;
      lctx.shadowBlur = 10;
      lctx.stroke();
      lctx.shadowBlur = 0;
    });
  }

  function lLoop() {
    lctx.clearRect(0, 0, LW, LH); // overlay: sin rastro/tinte, solo lo activo en este momento
    drawRibbons();
    drawParticles();
    requestAnimationFrame(lLoop);
  }
  lLoop();

  // primera ráfaga suave a los 3s de cargar, luego cada 15s
  setTimeout(burst, 3000);
  setInterval(burst, 15000);
})();
</script>
