<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Colección — Xbox Series X</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #050505; color: #fff;
    font-family: 'Segoe UI', -apple-system, Roboto, sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(165deg, #0e1710 0%, #0a0d0a 50%, #050505 100%);
  }
  .shell { position: relative; z-index: 1; padding: 22px 3vw 60px; max-width: 1400px; margin: 0 auto; }

  .hero-section { position: relative; margin: -22px -3vw 0; padding: 22px 3vw 28px; overflow: hidden; }
  .hero-bg-img {
    position: absolute; inset: 0; opacity: 0;
    background-size: cover; background-position: center top;
    animation: heroFadeIn 0.6s ease forwards;
  }
  @keyframes heroFadeIn { to { opacity: 1; } }
  .hero-scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(5,8,5,0.35) 0%, rgba(5,8,5,0.55) 60%, rgba(5,8,5,0.95) 100%);
  }
  .hero-section > .topbar, .hero-section > .hero-row { position: relative; z-index: 1; }

  /* top bar */
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
  .profile { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(140deg, #7d5fff, #ff6b6b);
    position: relative; flex-shrink: 0;
  }
  .avatar::after {
    content: ""; position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px;
    background: #6bcb2e; border: 2px solid #050505; border-radius: 50%;
  }
  .profile-name { font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .badge {
    font-size: 0.55rem; font-weight: 800; background: #fff; color: #000;
    padding: 1px 6px; border-radius: 2px; letter-spacing: 0.02em;
  }
  .gamerscore { font-size: 0.72rem; color: #a8d979; margin-top: 2px; display: flex; align-items: center; gap: 4px; }

  .icon-controls { display: flex; align-items: center; gap: 26px; }
  .icon-flat {
    background: none; border: none; color: #fff; font-size: 1rem; cursor: pointer;
    opacity: 0.9; position: relative;
  }
  .icon-flat:hover { opacity: 1; }
  .popover {
    position: absolute; top: 30px; right: -10px; z-index: 10;
    background: #14171a; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    padding: 10px; box-shadow: 0 12px 30px rgba(0,0,0,0.5); display: none; min-width: 180px;
  }
  .popover.show { display: block; }
  .popover input, .popover select {
    width: 100%; padding: 7px 9px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15);
    background: #0b0d0e; color: #fff; font-size: 0.78rem; font-family: inherit; outline: none;
  }
  .right-cluster { display: flex; align-items: center; gap: 18px; font-size: 0.85rem; color: #ddd; }

  /* hero row */
  .hero-row { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 28px; overflow-x: auto; padding-bottom: 4px; }
  .tile-focused {
    flex-shrink: 0; width: 230px; height: 300px; border-radius: 6px; overflow: hidden;
    border: 3px solid #8bc53f; background: #111; position: relative;
    display: flex; flex-direction: column; text-decoration: none; color: inherit;
    box-shadow: 0 0 22px rgba(139,197,63,0.35);
  }
  .tile-focused .art {
    flex: 1; display: flex; align-items: center; justify-content: center; background: #0c0e0c; padding: 14px;
  }
  .tile-focused .art img { max-width: 90%; max-height: 90%; object-fit: contain; }
  .tile-focused .cap { padding: 10px 12px 14px; font-size: 0.85rem; font-weight: 600; line-height: 1.25; }

  .tile-small {
    flex-shrink: 0; width: 140px; height: 140px; border-radius: 6px; overflow: hidden;
    background: #111; display: flex; align-items: center; justify-content: center; padding: 10px;
    text-decoration: none; border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .tile-small:hover { transform: scale(1.05); border-color: rgba(255,255,255,0.4); }
  .tile-small img { max-width: 88%; max-height: 88%; object-fit: contain; }

  /* promo banner row */
  .promo-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
  .promo {
    position: relative; height: 150px; border-radius: 6px; overflow: hidden;
    text-decoration: none; color: #fff; display: flex; align-items: flex-end;
    padding: 14px; background: #111;
  }
  .promo .pbg { position: absolute; inset: 0; opacity: 0.55; }
  .promo .pbg img { width: 100%; height: 100%; object-fit: cover; }
  .promo::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.85) 100%);
  }
  .promo .ptext { position: relative; z-index: 1; font-size: 0.85rem; font-weight: 600; }
  .promo .ptag { position: relative; z-index: 1; font-size: 0.62rem; color: #a8d979; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.04em; }

  .section-gap { height: 30px; }

  /* modal de confirmación */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 50; display: none;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(3px);
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #14181a; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
    padding: 22px; max-width: 340px; width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  }
  .modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 14px; }
  .modal-attrs {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px;
    background: #0a0d0a; border-radius: 8px; padding: 12px 14px; margin-bottom: 16px;
  }
  .modal-attr-label {
    font-size: 0.62rem; color: #6b8a67; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .modal-attr-value { font-size: 0.8rem; color: #fff; font-weight: 600; margin-top: 2px; }
  .modal-attr-value.muted { color: #6b6b6b; font-weight: 400; font-style: italic; }
  .modal-divider { border-top: 1px solid rgba(255,255,255,0.08); margin-bottom: 14px; }
  .modal-url {
    font-size: 0.72rem; color: #9db89a; word-break: break-all;
    background: #0a0d0a; border-radius: 6px; padding: 8px 10px; margin-bottom: 18px;
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btn {
    border: none; border-radius: 6px; padding: 9px 16px; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .modal-btn.cancel { background: rgba(255,255,255,0.08); color: #fff; }
  .modal-btn.cancel:hover { background: rgba(255,255,255,0.15); }
  .modal-btn.confirm { background: #5dc21e; color: #04250a; }
  .modal-btn.confirm:hover { background: #6dd52a; }
</style>
</head>
<body>
<div class="bg"></div>

<div class="shell">
  <div class="hero-section" id="heroSection">
  <div class="topbar">
    <div class="profile">
      <div class="avatar"></div>
      <div>
        <div class="profile-name">JF <span class="badge">PRIVADO</span></div>
        <div class="gamerscore">🎮 Mi Colección</div>
      </div>
    </div>
    <div class="icon-controls">
      <button class="icon-flat" id="searchBtn">🔍</button>
      <div class="popover" id="searchPop"><input id="search" type="text" placeholder="Buscar..."></div>
      <button class="icon-flat" id="genreBtn">▤</button>
      <div class="popover" id="genrePop"><select id="genreFilter"></select></div>
      <button class="icon-flat" id="sortBtn" title="Ordenar tarjetas" style="font-size:0.8rem; font-weight:600; white-space:nowrap;">⇅ Ordenar</button>
      <div class="popover" id="sortPop">
        <select id="sortBy">
          <option value="date-desc">Más reciente</option>
          <option value="date-asc">Más antiguo</option>
          <option value="title-asc">Título A-Z</option>
          <option value="title-desc">Título Z-A</option>
        </select>
      </div>
    </div>
    <div class="right-cluster">
      <span id="clock"></span>
    </div>
  </div>

  <div id="heroRow" class="hero-row"></div>
  </div>
  <div class="section-gap"></div>
  <div id="promoRow" class="promo-row"></div>
</div>

<div id="confirmModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Nombre del juego</div>

    <div class="modal-attrs" id="modalAttrs"></div>

    <div class="modal-divider"></div>

    <div class="modal-url" id="modalUrl"></div>
    <div class="modal-actions">
      <button id="modalCancel" class="modal-btn cancel">Cancelar</button>
      <button id="modalConfirm" class="modal-btn confirm">Ir al playlist</button>
    </div>
  </div>
</div>

<script>
const playlists = [
  {
    title: "F1 2000 (PSX)",
    desc: "6 videos",
    url: "https://www.youtube.com/playlist?list=PLJXk52AjnOAM",
    thumb: "./assets/logos/f1_2000.png",
    genre: "Racing",
    updated: "2024-06-21",
    releaseDate: "2000-03-27",
    duration: "7h 3m",
    bg: "./assets/backgrounds/f1_2000_bg.jpg"
  },
  {
    title: "Minecraft",
    desc: "8 videos",
    url: "https://www.youtube.com/playlist?list=PLC7qZUo5o1dU",
    thumb: "./assets/logos/minecraft.png",
    genre: "Sandbox",
    updated: "2021-09-05",
    releaseDate: "2011-11-18",
    duration: "0h 9m",
    bg: "./assets/backgrounds/minecraft_bg.jpg"
  },
  {
    title: "Final Fantasy IX",
    desc: "22 videos",
    url: "https://www.youtube.com/playlist?list=PLeGuSdYfxKFw",
    thumb: "./assets/logos/ff9.png",
    genre: "RPG",
    updated: "2026-04-19",
    bg: "./assets/backgrounds/ff9_bg.jpg"
  , duration: "44h 18m", releaseDate: "2000-11-14"},
  { title: "Final Fantasy 7 Remake | Intergrade", desc: "21 videos", url: "https://www.youtube.com/playlist?list=PLV8T9JsLJRxs", thumb: "./assets/logos/ff7.png", genre: "RPG", updated: "2026-07-06" , bg: "./assets/backgrounds/ff7_bg.jpg", duration: "36h 20m", releaseDate: "2021-06-10"},
  { title: "Grand Theft Auto Online", desc: "3 videos", url: "https://www.youtube.com/playlist?list=PL2VIAcWUrvBQ_UzOly3QDKYhkCrF711Mx", thumb: "./assets/logos/gta.png", genre: "Sandbox", updated: "2020-10-17" , bg: "./assets/backgrounds/gta_bg.jpg", duration: "0h 6m", releaseDate: "2013-10-01"},
  { title: "Sheep Raider", desc: "8 videos", url: "https://www.youtube.com/playlist?list=PL2VIAcWUrvBQe4wyV0VCpb6SnP5whF1t2", thumb: "./assets/logos/sheep.png", genre: "Platform", updated: "2020-06-27" , bg: "./assets/backgrounds/sheep_bg.jpg", duration: "7h 8m", releaseDate: "2001-09-27"},
  { title: "Crash Nitro Fuelled", desc: "15 videos", url: "https://www.youtube.com/playlist?list=PL2VIAcWUrvBQGiHOepeX1qHevtJtV4Pw2", thumb: "./assets/logos/ctr.png", genre: "Racing", updated: "2020-06-07" , bg: "./assets/backgrounds/ctr_bg.jpg", duration: "11h 0m", releaseDate: "2019-06-21"},
  { title: "Spyro Reignited Trilogy - Spyro 3 Year of the Dragon", desc: "8 videos", url: "https://www.youtube.com/playlist?list=PL2VIAcWUrvBSyqFFRSLydJgFQeVXhsEGC", thumb: "./assets/logos/spyro3.png", genre: "Platform", updated: "2019-01-07" , bg: "./assets/backgrounds/spyro3_bg.jpg", duration: "4h 44m", releaseDate: "2018-11-13"},
  { title: "Spyro Reignited Trilogy - Spyro 2 Ripto's Rage", desc: "17 videos", url: "https://www.youtube.com/playlist?list=PL2VIAcWUrvBSEbhi3Wg97QiuJ0dD9r9US", thumb: "./assets/logos/spyro2.png", genre: "Platform", updated: "2019-01-04" , bg: "./assets/backgrounds/spyro2_bg.jpg", duration: "11h 15m", releaseDate: "2018-11-13"},
  { title: "Klonoa: Door to Phantomile", desc: "5 videos", url: "https://www.youtube.com/playlist?list=PL2VIAcWUrvBRTK1HVJkNGD3eFzN6kWiq8", thumb: "./assets/logos/klonoa.png", genre: "Platform", updated: "2019-01-04" , bg: "./assets/backgrounds/klonoa_bg.jpg", duration: "3h 0m", releaseDate: "1998-03-10"},
  { title: "Crash Bandicoot 2: Cortex Strikes Back", desc: "8 videos", url: "https://www.youtube.com/playlist?list=PL2VIAcWUrvBSPTXkjx7GnKkHAXPrWMDYe", thumb: "./assets/logos/crash2.png", genre: "Platform", updated: "2018-12-30" , bg: "./assets/backgrounds/crash2_bg.jpg", duration: "3h 59m", releaseDate: "1997-11-06"}
];

const heroRow = document.getElementById('heroRow');
const promoRow = document.getElementById('promoRow');
const searchInput = document.getElementById('search');
const genreFilter = document.getElementById('genreFilter');
const sortBy = document.getElementById('sortBy');
const clockEl = document.getElementById('clock');

function updateClock() {
  const now = new Date();
  clockEl.textContent = now.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
}
updateClock();
setInterval(updateClock, 30000);

function setupPopover(btnId, popId) {
  const btn = document.getElementById(btnId);
  const pop = document.getElementById(popId);
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.popover').forEach(p => { if (p !== pop) p.classList.remove('show'); });
    pop.classList.toggle('show');
  });
}
setupPopover('searchBtn', 'searchPop');
setupPopover('genreBtn', 'genrePop');
setupPopover('sortBtn', 'sortPop');
document.addEventListener('click', () => document.querySelectorAll('.popover').forEach(p => p.classList.remove('show')));
document.querySelectorAll('.popover').forEach(p => p.addEventListener('click', e => e.stopPropagation()));

function populateGenres() {
  const genres = [...new Set(playlists.map(p => p.genre || "Sin categoria"))].sort();
  genreFilter.innerHTML = '<option value="all">Todos</option>' + genres.map(g => `<option value="${g}">${g}</option>`).join('');
}

const heroSection = document.getElementById('heroSection');

// Modal de confirmación antes de abrir cualquier enlace de YouTube
const confirmModal = document.getElementById('confirmModal');
const modalTitle = document.getElementById('modalTitle');
const modalAttrs = document.getElementById('modalAttrs');
const modalUrl = document.getElementById('modalUrl');
const modalCancel = document.getElementById('modalCancel');
const modalConfirm = document.getElementById('modalConfirm');
let pendingUrl = null;

function formatDate(iso) {
  if (!iso) return null;
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short', year: 'numeric' });
}

function attrRow(label, value, muted) {
  return `<div>
      <div class="modal-attr-label">${label}</div>
      <div class="modal-attr-value${muted ? ' muted' : ''}">${value}</div>
    </div>`;
}

function showConfirmModal(game) {
  pendingUrl = game.url;
  modalTitle.textContent = game.title;

  const videoCountMatch = (game.desc || '').match(/\d+/);
  const videoCount = videoCountMatch ? videoCountMatch[0] + ' videos' : 'No disponible';
  const playlistDate = formatDate(game.updated) || 'No disponible';
  const releaseDate = game.releaseDate ? formatDate(game.releaseDate) : 'No disponible';
  const duration = game.duration || 'No disponible';

  modalAttrs.innerHTML =
    attrRow('Género', game.genre || 'Sin categoría') +
    attrRow('Fecha de lanzamiento', releaseDate, !game.releaseDate) +
    attrRow('Playlist actualizada', playlistDate) +
    attrRow('Cantidad de videos', videoCount) +
    attrRow('Duración total', duration, !game.duration);

  modalUrl.textContent = game.url;
  confirmModal.classList.add('show');
}
function hideConfirmModal() {
  confirmModal.classList.remove('show');
  pendingUrl = null;
}
modalCancel.addEventListener('click', hideConfirmModal);
modalConfirm.addEventListener('click', () => {
  if (pendingUrl) window.open(pendingUrl, '_blank', 'noopener,noreferrer');
  hideConfirmModal();
});
confirmModal.addEventListener('click', (e) => {
  if (e.target === confirmModal) hideConfirmModal();
});
let currentHeroBg = null;
function setHeroBackground(src) {
  if (!src || src === currentHeroBg) {
    if (!src) { heroSection.querySelectorAll('.hero-bg-img, .hero-scrim').forEach(el => el.remove()); currentHeroBg = null; }
    return;
  }
  currentHeroBg = src;
  heroSection.querySelectorAll('.hero-bg-img, .hero-scrim').forEach(el => el.remove());
  const imgLayer = document.createElement('div');
  imgLayer.className = 'hero-bg-img';
  imgLayer.style.backgroundImage = `url("${src}")`;
  const scrim = document.createElement('div');
  scrim.className = 'hero-scrim';
  heroSection.prepend(scrim);
  heroSection.prepend(imgLayer);
}

let selectedKey = null;
let promoPicks = null; // se sortea una sola vez por sesión, no en cada render

function updateHeroRowPadding() {
  const containerW = heroRow.clientWidth;
  const approxTileHalf = 75; // mitad aproximada del ancho de un tile pequeño
  const sidePad = Math.max(16, Math.round(containerW / 2 - approxTileHalf));
  heroRow.style.paddingLeft = sidePad + 'px';
  heroRow.style.paddingRight = sidePad + 'px';
}

function render() {
  const searchText = searchInput.value.toLowerCase();
  const genreVal = genreFilter.value;
  const sortVal = sortBy.value;

  let filtered = playlists.filter(p => {
    const matchesSearch = p.title.toLowerCase().includes(searchText);
    const matchesGenre = genreVal === "all" || (p.genre || "Sin categoria") === genreVal;
    return matchesSearch && matchesGenre;
  });
  filtered.sort((a, b) => {
    if (sortVal === "title-asc") return a.title.localeCompare(b.title);
    if (sortVal === "title-desc") return b.title.localeCompare(a.title);
    if (sortVal === "date-desc") return new Date(b.updated) - new Date(a.updated);
    if (sortVal === "date-asc") return new Date(a.updated) - new Date(b.updated);
    return 0;
  });

  heroRow.innerHTML = "";
  promoRow.innerHTML = "";
  if (filtered.length === 0) {
    heroRow.innerHTML = '<div style="color:#888;padding:20px;">No se encontraron playlists.</div>';
    return;
  }

  // ¿Cuál está seleccionada? Si la anterior ya no está en la lista filtrada, cae en la primera.
  let selected = filtered.find(p => p.url === selectedKey) || filtered[0];
  selectedKey = selected.url;
  setHeroBackground(selected.bg || selected.thumb || '');

  // Todas las tarjetas en su orden natural; la seleccionada se ve grande, el resto pequeñas.
  filtered.forEach(p => {
    const art = p.thumb ? `<img src="${p.thumb}" alt="">` : '';
    if (p.url === selectedKey) {
      heroRow.innerHTML += `<a class="tile-focused" href="javascript:void(0)" data-url="${p.url}">
          <div class="art">${art}</div>
          <div class="cap">${p.title}</div>
        </a>`;
    } else {
      heroRow.innerHTML += `<a class="tile-small" href="javascript:void(0)" data-url="${p.url}">${art}</a>`;
    }
  });

  // Tocar/hacer clic en una tarjeta no seleccionada la selecciona (no navega);
  // tocar la ya seleccionada (la grande) abre el modal de confirmación antes de ir a YouTube.
  heroRow.querySelectorAll('a[data-url]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      if (a.dataset.url !== selectedKey) {
        selectedKey = a.dataset.url;
        render();
      } else {
        const game = playlists.find(g => g.url === a.dataset.url);
        showConfirmModal(game);
      }
    });
  });

  updateHeroRowPadding();

  // Banda de banners: tarjeta "Todos" + una por género, con un juego aleatorio como imagen
  // (se sortea una sola vez por sesión, no en cada render)
  if (!promoPicks) {
    const genres = [...new Set(playlists.map(p => p.genre || "Sin categoria"))].sort();
    const randomAny = playlists[Math.floor(Math.random() * playlists.length)];
    promoPicks = [
      { genre: 'all', game: randomAny, label: 'Todos' },
      ...genres.map(g => {
        const inGenre = playlists.filter(p => (p.genre || "Sin categoria") === g);
        const randomGame = inGenre[Math.floor(Math.random() * inGenre.length)];
        return { genre: g, game: randomGame, label: g };
      })
    ];
  }
  promoRow.innerHTML = "";
  promoPicks.forEach(({ genre, game, label }) => {
    const bgImg = (game && (game.bg || game.thumb)) || '';
    const el = document.createElement('a');
    el.className = 'promo';
    el.href = 'javascript:void(0)';
    el.innerHTML = `
        <div class="pbg">${bgImg ? `<img src="${bgImg}" alt="">` : ''}</div>
        <div style="position:relative;z-index:1;">
          <span class="ptag">Categoría</span>
          <span class="ptext">Explora: ${label}</span>
        </div>`;
    el.addEventListener('click', () => {
      try {
        history.pushState({ genre }, '', '#' + encodeURIComponent(genre));
      } catch (err) {
        // Algunos entornos (como la vista previa embebida) restringen pushState.
        // No pasa nada: el filtro se aplica igual, solo no queda registrado en el historial.
        console.warn('pushState no disponible en este entorno:', err.message);
      }
      genreFilter.value = genre;
      resetSelectionAndRender();
      heroSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    promoRow.appendChild(el);
  });
}

// Scroll en la fila: selecciona automáticamente la tarjeta más cercana al centro
let scrollTicking = false;
heroRow.addEventListener('scroll', () => {
  if (scrollTicking) return;
  scrollTicking = true;
  requestAnimationFrame(() => {
    const rowRect = heroRow.getBoundingClientRect();
    const rowCenter = rowRect.left + rowRect.width / 2;
    let closest = null, closestDist = Infinity;
    heroRow.querySelectorAll('a[data-url]').forEach(a => {
      const r = a.getBoundingClientRect();
      const center = r.left + r.width / 2;
      const dist = Math.abs(center - rowCenter);
      if (dist < closestDist) { closestDist = dist; closest = a; }
    });
    if (closest && closest.dataset.url !== selectedKey) {
      selectedKey = closest.dataset.url;
      render();
    }
    scrollTicking = false;
  });
}, { passive: true });

populateGenres();
render();
window.addEventListener('resize', updateHeroRowPadding);

function resetSelectionAndRender() {
  selectedKey = null;
  render();
}

// Al presionar "atrás" en el navegador, vuelve a la vista sin filtro de género
window.addEventListener('popstate', (e) => {
  genreFilter.value = (e.state && e.state.genre) || 'all';
  resetSelectionAndRender();
});
searchInput.addEventListener('input', resetSelectionAndRender);
genreFilter.addEventListener('change', resetSelectionAndRender);
sortBy.addEventListener('change', resetSelectionAndRender);
</script>
</body>
</html>
